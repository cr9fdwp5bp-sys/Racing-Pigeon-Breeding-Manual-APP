<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超級種鴿管理系統 (Web App)</title>
    <style>
        :root {
            --primary: #065a60;
            --secondary: #0b525b;
            --bg-color: #f4f7f6;
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ffc107;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: #333;
        }
        .header {
            background-color: var(--primary);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        .nav {
            display: flex;
            background-color: var(--secondary);
            overflow-x: auto;
        }
        .nav button {
            background: none;
            border: none;
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 16px;
            flex: 1;
        }
        .nav button:hover, .nav button.active {
            background-color: rgba(255,255,255,0.2);
        }
        .container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], input[type="date"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button.submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button.submit-btn:hover {
            background-color: var(--secondary);
        }
        .alert-box {
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
            display: none;
        }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th { background-color: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🏆 達人種鴿管理系統</h2>
    </div>

    <div class="nav">
        <button class="active" onclick="openTab('env-tab')">環境監控</button>
        <button onclick="openTab('poop-tab')">糞便紀錄</button>
        <button onclick="openTab('health-tab')">健康紀錄</button>
    </div>

    <div class="container">
        <!-- 模組 1: 環境監控 -->
        <div id="env-tab" class="tab-content active">
            <h3>環境數據紅色警戒測試</h3>
            <div class="form-group">
                <label>舍內氨氣濃度 (ppm):</label>
                <input type="number" id="ammonia" placeholder="安全值 < 15">
            </div>
            <div class="form-group">
                <label>底層相對濕度 (%):</label>
                <input type="number" id="humidity" placeholder="安全值 < 70">
            </div>
            <div class="form-group">
                <label>晝夜溫差 (°C):</label>
                <input type="number" id="tempDiff" placeholder="安全值 < 10">
            </div>
            <div class="form-group">
                <label>飲水 TDS 值 (ppm):</label>
                <input type="number" id="tds" placeholder="安全值 < 200">
            </div>
            <button class="submit-btn" onclick="checkEnvironment()">檢測風險</button>
            
            <div id="env-alert" class="alert-box"></div>
        </div>

        <!-- 模組 2: 糞便紀錄 -->
        <div id="poop-tab" class="tab-content">
            <h3>每日糞便基準線紀錄</h3>
            <div class="form-group">
                <label>日期:</label>
                <input type="date" id="poop-date">
            </div>
            <div class="form-group">
                <label>腳環號 (或配對籠號):</label>
                <input type="text" id="poop-id" placeholder="例如: T-2023-123456">
            </div>
            <div class="form-group">
                <label>狀態評估:</label>
                <select id="poop-status">
                    <option value="正常成團">正常成團</option>
                    <option value="條狀偏軟">條狀偏軟</option>
                    <option value="水便">水便</option>
                    <option value="綠便">綠便</option>
                    <option value="帶血">帶血</option>
                </select>
            </div>
            <button class="submit-btn" onclick="savePoopData()">儲存紀錄</button>

            <h4>歷史紀錄 (本地端快取)</h4>
            <table id="poop-table">
                <thead><tr><th>日期</th><th>腳環號</th><th>狀態</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 模組 3: 健康紀錄 -->
        <div id="health-tab" class="tab-content">
            <h3>個體健康紀錄卡</h3>
            <div class="form-group">
                <label>日期:</label>
                <input type="date" id="health-date">
            </div>
            <div class="form-group">
                <label>腳環號:</label>
                <input type="text" id="health-id" placeholder="例如: T-2023-123456">
            </div>
            <div class="form-group">
                <label>常態體重 (g):</label>
                <input type="number" id="health-weight">
            </div>
            <div class="form-group">
                <label>異常事件 / 用藥備註:</label>
                <textarea id="health-notes" rows="3" placeholder="例如: 投餵水飛薊素第1天"></textarea>
            </div>
            <button class="submit-btn" onclick="saveHealthData()">儲存紀錄</button>

            <h4>歷史紀錄 (本地端快取)</h4>
            <table id="health-table">
                <thead><tr><th>日期</th><th>腳環號</th><th>體重(g)</th><th>備註</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        // 初始化日期為今日
        document.getElementById('poop-date').valueAsDate = new Date();
        document.getElementById('health-date').valueAsDate = new Date();

        // 頁籤切換邏輯
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 環境數據檢測邏輯
        function checkEnvironment() {
            const ammonia = parseFloat(document.getElementById('ammonia').value) || 0;
            const humidity = parseFloat(document.getElementById('humidity').value) || 0;
            const tempDiff = parseFloat(document.getElementById('tempDiff').value) || 0;
            const tds = parseFloat(document.getElementById('tds').value) || 0;
            
            let alerts = [];
            
            if (ammonia > 15) alerts.push("【紅色警戒】氨氣 > 15ppm：呼吸道黏膜受損，請強制排氣！");
            if (humidity > 80) alerts.push("【紅色警戒】濕度 > 80%：黴菌活化風險高，需除濕！");
            if (tempDiff > 10) alerts.push("【紅色警戒】溫差 > 10°C：觸發慢性應激，加強夜間保溫！");
            if (tds > 300) alerts.push("【紅色警戒】TDS > 300ppm：腸道菌相失衡，請改用純水！");

            const alertBox = document.getElementById('env-alert');
            alertBox.style.display = 'block';

            if (alerts.length > 0) {
                alertBox.className = 'alert-box alert-danger';
                alertBox.innerHTML = "<strong>發現風險：</strong><br>" + alerts.join("<br>");
            } else {
                alertBox.className = 'alert-box alert-success';
                alertBox.innerHTML = "<strong>環境數據正常</strong>：目前未觸發紅色警戒。";
            }
        }

        // 通用儲存與渲染邏輯 (基於瀏覽器 LocalStorage)
        function saveData(storageKey, dataObj) {
            let data = JSON.parse(localStorage.getItem(storageKey)) || [];
            data.push(dataObj);
            localStorage.setItem(storageKey, JSON.stringify(data));
        }

        function loadData(storageKey, tableId, columns) {
            let data = JSON.parse(localStorage.getItem(storageKey)) || [];
            let tbody = document.querySelector(`#${tableId} tbody`);
            tbody.innerHTML = '';
            data.forEach((row, index) => {
                let tr = document.createElement('tr');
                columns.forEach(col => {
                    let td = document.createElement('td');
                    td.textContent = row[col];
                    tr.appendChild(td);
                });
                let actionTd = document.createElement('td');
                actionTd.innerHTML = `<button onclick="deleteData('${storageKey}', ${index}, '${tableId}', ${JSON.stringify(columns)})">刪除</button>`;
                tr.appendChild(actionTd);
                tbody.appendChild(tr);
            });
        }

        function deleteData(storageKey, index, tableId, columns) {
            let data = JSON.parse(localStorage.getItem(storageKey));
            data.splice(index, 1);
            localStorage.setItem(storageKey, JSON.stringify(data));
            loadData(storageKey, tableId, columns);
        }

        // 糞便數據操作
        function savePoopData() {
            const date = document.getElementById('poop-date').value;
            const id = document.getElementById('poop-id').value;
            const status = document.getElementById('poop-status').value;
            if(!id) return alert("請輸入腳環號");
            saveData('pigeon_poop', { date, id, status });
            loadData('pigeon_poop', 'poop-table', ['date', 'id', 'status']);
            document.getElementById('poop-id').value = ''; 
        }

        // 健康數據操作
        function saveHealthData() {
            const date = document.getElementById('health-date').value;
            const id = document.getElementById('health-id').value;
            const weight = document.getElementById('health-weight').value;
            const notes = document.getElementById('health-notes').value;
            if(!id) return alert("請輸入腳環號");
            saveData('pigeon_health', { date, id, weight, notes });
            loadData('pigeon_health', 'health-table', ['date', 'id', 'weight', 'notes']);
            document.getElementById('health-id').value = '';
            document.getElementById('health-weight').value = '';
            document.getElementById('health-notes').value = '';
        }

        // 初始化載入
        window.onload = function() {
            loadData('pigeon_poop', 'poop-table', ['date', 'id', 'status']);
            loadData('pigeon_health', 'health-table', ['date', 'id', 'weight', 'notes']);
        }
    </script>
</body>
</html>
