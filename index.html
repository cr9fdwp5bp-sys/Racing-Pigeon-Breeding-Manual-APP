<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>鴿舍日誌 Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a1a; color: #f4f4f4; max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: #2c3e50; color: white; padding: 1rem; text-align: center; font-weight: bold; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10;}
    .view { flex: 1; display: none; flex-direction: column; overflow-y: auto; background: #222; }
    .view.active { display: flex; }
    
    /* 總覽模組 */
    .dashboard-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
    .card { background: #333; padding: 15px; border-radius: 10px; text-align: center; border-top: 3px solid #27ae60; }
    .card.alert { border-top: 3px solid #e74c3c; }
    .card h3 { font-size: 2rem; margin: 10px 0; }
    .card p { color: #aaa; font-size: 0.9rem; }

    /* 相機模組 (延續原有設計) */
    #cameraView { position: relative; background: #000; overflow: hidden; }
    #cameraPreview { width: 100%; height: 100%; object-fit: cover; }
    .shutter-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; border-radius: 50%; background: rgba(255,255,255,0.9); border: 5px solid #2c3e50; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: transform 0.1s;}
    .shutter-btn:active { transform: translateX(-50%) scale(0.95); background: #ddd; }
    .status-badge { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; display: none; z-index: 5;}
    .badge-save { background: rgba(39, 174, 96, 0.9); color: white; }
    .badge-record { background: rgba(231, 76, 60, 0.9); color: white; animation: pulse 1s infinite; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    /* 日誌模組 */
    .timeline { padding: 15px; }
    .log-item { background: #333; border-radius: 8px; margin-bottom: 15px; overflow: hidden; display: flex; }
    .log-img { width: 100px; height: 100px; object-fit: cover; background: #444; }
    .log-info { padding: 10px; flex: 1; display: flex; flex-direction: column; justify-content: center;}
    .log-info strong { font-size: 1.1rem; color: #2ecc71; }
    .log-info small { color: #999; margin-top: 5px; }
    .health-tag { display: inline-block; padding: 2px 8px; background: #555; border-radius: 4px; font-size: 0.8rem; margin-top: 5px; width: fit-content;}

    /* 底部導覽 */
    .footer-bar { display: flex; background: #1a1a1a; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
    .footer-btn { flex: 1; padding: 12px 0; text-align: center; color: #777; cursor: pointer; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; gap: 4px;}
    .footer-btn.active { color: #2ecc71; background: #222; }
    
    /* 表單元件 */
    .form-group { padding: 15px; }
    .form-group label { display: block; margin-bottom: 8px; color: #aaa; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 1rem; }
  </style>
</head>
<body>

  <div class="header" id="mainHeader">📊 總覽儀表板</div>

  <!-- 視圖 1: 總覽 -->
  <div id="dashboardView" class="view active">
    <div class="dashboard-cards">
      <div class="card">
        <p>今日新增紀錄</p>
        <h3 id="statToday">0</h3>
      </div>
      <div class="card alert">
        <p>異常狀態 (需注意)</p>
        <h3 id="statAlert">0</h3>
      </div>
    </div>
    <div class="form-group">
      <h4 style="margin-bottom: 10px;">系統狀態</h4>
      <p style="color: #aaa; font-size: 0.9rem;">本地資料庫運作中。若需匯出分析，請至設定模組操作。</p>
    </div>
  </div>

  <!-- 視圖 2: 相機 -->
  <div id="cameraView" class="view">
    <video id="cameraPreview" autoplay playsinline></video>
    <div class="status-badge badge-save" id="saveIndicator">✓ 影像已儲存</div>
    <div class="status-badge badge-record" id="audioIndicator">🔴 錄音中 (3秒)</div>
    <button class="shutter-btn" id="shutterBtn">📷</button>
  </div>

  <!-- 視圖 3: 日誌 -->
  <div id="timelineView" class="view">
    <div class="timeline" id="timelineContent"></div>
  </div>

  <!-- 視圖 4: 設定 -->
  <div id="settingsView" class="view">
    <div class="form-group">
      <label>預設歸檔鴿舍</label>
      <input type="text" id="defaultZone" value="種鴿一舍">
    </div>
    <div class="form-group">
      <button style="width: 100%; padding: 12px; background: #2980b9; color: white; border: none; border-radius: 6px; font-size: 1rem;">📦 匯出紀錄 (CSV/ZIP)</button>
    </div>
  </div>

  <div class="footer-bar">
    <div class="footer-btn active" data-view="dashboardView" data-title="📊 總覽儀表板"><span>📊</span>總覽</div>
    <div class="footer-btn" data-view="cameraView" data-title="📷 臨床紀錄"><span>📷</span>快拍</div>
    <div class="footer-btn" data-view="timelineView" data-title="📅 歷史日誌"><span>📅</span>日誌</div>
    <div class="footer-btn" data-view="settingsView" data-title="⚙️ 系統設定"><span>⚙️</span>設定</div>
  </div>

  <script>
    // --- 核心邏輯與 IndexedDB 整合 ---
    const DB_NAME = 'PigeonProDB';
    let db;
    let currentStream = null;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = (e) => {
          db = e.target.result;
          db.createObjectStore('logs', { keyPath: 'id' });
          db.createObjectStore('profiles', { keyPath: 'bandId' });
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(); updateDashboard(); };
        req.onerror = (e) => reject(e);
      });
    }

    async function addLog(log) {
      const tx = db.transaction('logs', 'readwrite');
      tx.objectStore('logs').put(log);
      return new Promise(r => { tx.oncomplete = () => { r(); updateDashboard(); }; });
    }

    async function getAllLogs() {
      const tx = db.transaction('logs', 'readonly');
      const req = tx.objectStore('logs').getAll();
      return new Promise(r => { req.onsuccess = () => r(req.result); });
    }

    // --- 相機與媒體存取 ---
    async function startCamera() {
      if (currentStream) return;
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('cameraPreview').srcObject = currentStream;
      } catch (e) {
        console.error("相機存取失敗", e);
      }
    }
    
    function stopCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        currentStream = null;
      }
    }

    async function takePhoto() {
      const video = document.getElementById('cameraPreview');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      
      const id = 'log_' + Date.now();
      const logData = {
        id: id,
        timestamp: new Date().toISOString(),
        image: canvas.toDataURL('image/jpeg', 0.7),
        health: '待評估', 
        bandId: '未綁定'
      };
      
      await addLog(logData);
      
      // UI 反饋
      const saveInd = document.getElementById('saveIndicator');
      saveInd.style.display = 'block';
      setTimeout(() => saveInd.style.display = 'none', 1500);
      
      // 模擬錄音啟動
      const audioInd = document.getElementById('audioIndicator');
      audioInd.style.display = 'block';
      setTimeout(() => audioInd.style.display = 'none', 3000);
    }

    document.getElementById('shutterBtn').addEventListener('click', takePhoto);

    // --- 數據渲染與切換 ---
    async function updateDashboard() {
      const logs = await getAllLogs();
      const today = new Date().toISOString().split('T')[0];
      const todayLogs = logs.filter(l => l.timestamp.startsWith(today));
      
      document.getElementById('statToday').innerText = todayLogs.length;
      document.getElementById('statAlert').innerText = logs.filter(l => l.health !== '正常' && l.health !== '待評估').length;
    }

    async function renderTimeline() {
      const logs = await getAllLogs();
      logs.sort((a,b) => b.timestamp.localeCompare(a.timestamp));
      
      let html = '';
      logs.forEach(l => {
        const dateStr = new Date(l.timestamp).toLocaleString('zh-TW', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        html += `
          <div class="log-item">
            <img src="${l.image}" class="log-img" alt="log">
            <div class="log-info">
              <strong>${l.bandId}</strong>
              <small>${dateStr}</small>
              <div class="health-tag">${l.health}</div>
            </div>
          </div>
        `;
      });
      document.getElementById('timelineContent').innerHTML = html || '<p style="text-align:center; color:#aaa; margin-top:20px;">尚無紀錄資料</p>';
    }

    // 視圖路由管理
    document.querySelectorAll('.footer-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.footer-btn').forEach(b => b.classList.remove('active'));
        
        const targetView = btn.dataset.view;
        document.getElementById(targetView).classList.add('active');
        btn.classList.add('active');
        document.getElementById('mainHeader').innerText = btn.dataset.title;

        if (targetView === 'cameraView') startCamera();
        else stopCamera();
        
        if (targetView === 'timelineView') renderTimeline();
        if (targetView === 'dashboardView') updateDashboard();
      });
    });

    // 初始化
    window.addEventListener('load', openDB);
  </script>
</body>
</html>
