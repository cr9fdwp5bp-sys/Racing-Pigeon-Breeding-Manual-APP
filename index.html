<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>鴿舍日誌 Ultimate</title>
    <!-- 引入 Chart.js 用於數據視覺化 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text-main: #ffffff;
            --text-sec: #aaaaaa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 頂部導覽 */
        .header { background-color: var(--surface); padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #333; z-index: 10; }
        
        /* 視圖切換 */
        .view-container { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .view-container.active { display: block; }
        
        /* 卡片與表單 */
        .card { background-color: var(--surface); border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card-title { font-size: 1.1rem; margin-bottom: 10px; color: var(--secondary); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-sec); }
        .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; }
        
        /* 按鈕 */
        .btn { width: 100%; padding: 12px; border-radius: 5px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; background-color: var(--primary); color: #000; margin-top: 10px; }
        .btn-iot { background-color: #3700b3; color: white; }
        
        /* 警戒提示 */
        .alert-box { padding: 10px; border-radius: 5px; background-color: rgba(207, 102, 121, 0.2); border: 1px solid var(--error); color: var(--error); display: none; margin-bottom: 15px; }
        
        /* 圖表容器 */
        .chart-wrapper { position: relative; height: 250px; width: 100%; }
        
        /* 底部導覽 */
        .nav-bar { display: flex; background-color: var(--surface); border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: var(--text-sec); cursor: pointer; font-size: 0.85rem; }
        .nav-item.active { color: var(--primary); background-color: #2a2a2a; }
        .nav-icon { display: block; font-size: 1.2rem; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header" id="headerTitle">鴿舍日誌 Ultimate</div>

    <!-- 1. 總覽與圖表模組 (Dashboard & Visualization) -->
    <div id="view-dashboard" class="view-container active">
        <div id="iotAlert" class="alert-box">
            <strong>⚠️ IoT 環境警戒：</strong> 氨氣濃度已達 <span id="nh3Value">--</span> ppm (標準 < 15ppm)，請啟動強制排氣！
        </div>
        
        <div class="card">
            <div class="card-title">IoT 感測器模擬</div>
            <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 10px;">模擬接收舍內 ESP32 感測器數據 (RESTful API POST 示意)</p>
            <button class="btn btn-iot" onclick="simulateIoTPush()">模擬接收環境數據</button>
        </div>

        <div class="card">
            <div class="card-title">近30日糞便健康狀態分析</div>
            <div class="chart-wrapper">
                <canvas id="healthPieChart"></canvas>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">特定個體體重趨勢 (範例: T23-101)</div>
            <div class="chart-wrapper">
                <canvas id="weightLineChart"></canvas>
            </div>
        </div>
    </div>

    <!-- 2. 繁殖與血統模組 (Pedigree & Breeding) -->
    <div id="view-breeding" class="view-container">
        <div class="card">
            <div class="card-title">新增配對紀錄與孵化預測</div>
            <div class="form-group">
                <label>配對籠號</label>
                <input type="text" id="breedCage" placeholder="例如: A01">
            </div>
            <div class="form-group">
                <label>母鴿下蛋日期</label>
                <input type="date" id="eggDate">
            </div>
            <button class="btn" onclick="calculateHatch()">計算孵化排程</button>
            
            <div id="hatchResult" style="margin-top: 15px; padding: 10px; background: #2a2a2a; border-radius: 5px; display: none;">
                預計孵化日期 (18天)：<strong id="hatchDateOutput" style="color: var(--secondary);"></strong>
            </div>
        </div>
    </div>

    <!-- 3. 醫療與疫苗模組 (Medical Scheduler) -->
    <div id="view-medical" class="view-container">
        <div class="card">
            <div class="card-title">幼鴿 PMV-1 疫苗預防排程</div>
            <div class="form-group">
                <label>幼鴿腳環號</label>
                <input type="text" id="youngBirdId" placeholder="例如: T24-001">
            </div>
            <div class="form-group">
                <label>破殼日期</label>
                <input type="date" id="hatchDateInput">
            </div>
            <button class="btn" onclick="calculateVaccine()">產出疫苗計畫</button>
            
            <div id="vaccineResult" style="margin-top: 15px; padding: 10px; background: #2a2a2a; border-radius: 5px; display: none;">
                PMV-1 建議施打日 (3週齡)：<strong id="vaccineDateOutput" style="color: var(--error);"></strong>
            </div>
        </div>
    </div>

    <!-- 底部導覽列 -->
    <div class="nav-bar">
        <div class="nav-item active" data-target="view-dashboard" data-title="數據總覽">
            <span class="nav-icon">📊</span>總覽
        </div>
        <div class="nav-item" data-target="view-breeding" data-title="繁殖預測">
            <span class="nav-icon">🥚</span>繁殖
        </div>
        <div class="nav-item" data-target="view-medical" data-title="醫療排程">
            <span class="nav-icon">💉</span>醫療
        </div>
    </div>

    <script>
        // 頁面初始設定
        document.getElementById('eggDate').valueAsDate = new Date();
        document.getElementById('hatchDateInput').valueAsDate = new Date();

        // --- 視圖切換邏輯 ---
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                document.querySelectorAll('.view-container').forEach(view => view.classList.remove('active'));
                
                this.classList.add('active');
                document.getElementById(this.dataset.target).classList.add('active');
                document.getElementById('headerTitle').innerText = this.dataset.title;
            });
        });

        // --- 模組 1: IoT 數據模擬邏輯 ---
        function simulateIoTPush() {
            // 模擬亂數生成環境數據
            const mockAmmonia = (Math.random() * 10 + 10).toFixed(1); // 10.0 ~ 20.0 ppm
            const alertBox = document.getElementById('iotAlert');
            const nh3Span = document.getElementById('nh3Value');
            
            nh3Span.innerText = mockAmmonia;
            
            if (mockAmmonia > 15.0) {
                alertBox.style.display = 'block';
            } else {
                alertBox.style.display = 'none';
                alert(`環境數據正常。當前氨氣濃度: ${mockAmmonia} ppm`);
            }
        }

        // --- 模組 1: Chart.js 圖表渲染 ---
        // 1. 糞便狀態圓餅圖
        const ctxPie = document.getElementById('healthPieChart').getContext('2d');
        new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: ['正常成團', '水便', '綠便'],
                datasets: [{
                    data: [75, 15, 10], // 模擬數據
                    backgroundColor: ['#03dac6', '#cf6679', '#bb86fc'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
        });

        // 2. 體重趨勢折線圖
        const ctxLine = document.getElementById('weightLineChart').getContext('2d');
        new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: ['W1', 'W2', 'W3', 'W4', 'W5'],
                datasets: [{
                    label: '體重 (g)',
                    data: [420, 415, 410, 395, 390], // 呈現下降趨勢的模擬數據
                    borderColor: '#bb86fc',
                    backgroundColor: 'rgba(187, 134, 252, 0.2)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    y: { min: 350, max: 450, grid: { color: '#333' }, ticks: { color: '#aaa' } },
                    x: { grid: { color: '#333' }, ticks: { color: '#aaa' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- 模組 2: 繁殖與血統邏輯 (孵化期 +18天) ---
        function calculateHatch() {
            const eggDateStr = document.getElementById('eggDate').value;
            if(!eggDateStr) return;
            
            const eggDate = new Date(eggDateStr);
            // 依據 Levi (1977) 數據，取 18 天為標準
            eggDate.setDate(eggDate.getDate() + 18); 
            
            const targetDateStr = eggDate.toISOString().split('T')[0];
            document.getElementById('hatchDateOutput').innerText = targetDateStr;
            document.getElementById('hatchResult').style.display = 'block';
        }

        // --- 模組 3: 醫療與疫苗排程邏輯 (PMV-1 +21天) ---
        function calculateVaccine() {
            const hatchDateStr = document.getElementById('hatchDateInput').value;
            if(!hatchDateStr) return;
            
            const hatchDate = new Date(hatchDateStr);
            // 依據 AAAP 指南，設定 3 週齡 (21天) 首次接種
            hatchDate.setDate(hatchDate.getDate() + 21);
            
            const targetDateStr = hatchDate.toISOString().split('T')[0];
            document.getElementById('vaccineDateOutput').innerText = targetDateStr;
            document.getElementById('vaccineResult').style.display = 'block';
        }
    </script>
</body>
</html>
